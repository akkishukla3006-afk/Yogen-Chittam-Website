<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Login | Yogen Chittam</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:#f5f5f5;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.card{

width:400px;
border:none;
border-radius:20px;

}

</style>

</head>

<body>

<div class="card shadow-lg p-4">

<h2 class="text-center text-success mb-4">
Admin Login
</h2>

<form id="loginForm">

<div class="mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
id="email"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
class="form-control"
id="password"
required>

</div>

<button class="btn btn-success w-100">

Login

</button>

</form>

<p id="message" class="text-danger mt-3 text-center"></p>

</div>

<script type="module" src="login.js"></script>

</body>

</html>
