<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Yogen Chittam | Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
        }

        .navbar{
            background:#198754;
        }

        .dashboard-card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        .upload-card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        .preview-card{
            border:none;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 5px 20px rgba(0,0,0,.08);
            transition:.3s;
        }

        .preview-card:hover{
            transform:translateY(-5px);
        }

        .preview-card img{
            height:220px;
            object-fit:cover;
        }

        .preview-card video{
            height:220px;
            width:100%;
            object-fit:cover;
        }

        .section-title{
            font-weight:700;
            margin-bottom:20px;
        }

        .delete-btn{
            width:100%;
        }

        .stat-icon{
            font-size:45px;
            color:#198754;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<h3 class="text-white mb-0">
Yogen Chittam Admin
</h3>

<button
class="btn btn-light"
id="logoutBtn">

<i class="bi bi-box-arrow-right"></i>
Logout

</button>

</div>

</nav>

<div class="container py-5">

<div class="row g-4">

<div class="col-md-6">

<div class="dashboard-card p-4 bg-white text-center">

<i class="bi bi-images stat-icon"></i>

<h2 id="totalImages">0</h2>

<p class="text-secondary mb-0">
Gallery Images
</p>

</div>

</div>

<div class="col-md-6">

<div class="dashboard-card p-4 bg-white text-center">

<i class="bi bi-camera-video stat-icon"></i>

<h2 id="totalVideos">0</h2>

<p class="text-secondary mb-0">
Recorded Videos
</p>

</div>

</div>

</div>

<div class="row mt-4 g-4">

<div class="col-lg-6">

<div class="upload-card p-4 bg-white">

<h4 class="mb-3">
📸 Upload Gallery Image
</h4>

<input
type="file"
class="form-control"
id="galleryImage"
accept="image/*">

<button
class="btn btn-success w-100 mt-3"
id="uploadGallery">

Upload Image

</button>

</div>

</div>

<div class="col-lg-6">

<div class="upload-card p-4 bg-white">

<h4 class="mb-3">
🎥 Upload Recorded Class
</h4>

<input
type="file"
class="form-control"
id="recordedVideo"
accept="video/*">

<button
class="btn btn-success w-100 mt-3"
id="uploadVideo">

Upload Video

</button>

<div
class="progress mt-3"
id="videoProgressContainer"
style="display:none;height:22px;">

<div
class="progress-bar progress-bar-striped progress-bar-animated bg-success"
id="videoProgress"
style="width:0%;">

0%

</div>

</div>

</div>

</div>

</div>

<hr class="my-5">

<h3 class="section-title">
📸 Gallery Manager
</h3>

<div
class="row g-4"
id="galleryContainer">
</div>

<hr class="my-5">

<h3 class="section-title">
🎥 Recorded Classes Manager
</h3>

<div
class="row g-4"
id="videoContainer">

</div>

</div>

<!-- Delete Confirmation Modal -->

<div
class="modal fade"
id="deleteModal"
tabindex="-1">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">
Confirm Delete
</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body">

<p class="mb-0">

Are you sure you want to delete this item?

<br><br>

This will remove it from the website immediately.

</p>

</div>

<div class="modal-footer">

<button
type="button"
class="btn btn-secondary"
data-bs-dismiss="modal">

Cancel

</button>

<button
type="button"
class="btn btn-danger"
id="confirmDelete">

<i class="bi bi-trash"></i>

Delete

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="admin.js"></script>

</body>

</html>
